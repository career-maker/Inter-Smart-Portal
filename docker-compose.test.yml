version: '3.8'

services:
  test-db:
    image: postgres:15
    environment:
      POSTGRES_DB: hrms_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d hrms_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      APP_ENV: testing
      APP_KEY: base64:QPAxiCpApR38c8nmhcDcAe8QEcHnwn7GVPVL1AodZiU=
      DB_CONNECTION: pgsql
      DB_HOST: test-db
      DB_PORT: 5432
      DB_DATABASE: hrms_test_db
      DB_USERNAME: test_user
      DB_PASSWORD: test_pass
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    entrypoint: /bin/bash
    command: -c "php artisan migrate --force && php artisan test tests/Feature/BiometricReconciliationTest.php --no-coverage"
